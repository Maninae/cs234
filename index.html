<head>

<title>CS234 — Reinforcement Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --parchment: #f6f1eb;
  --parchment-dark: #ebe4da;
  --ink: #1a1714;
  --ink-light: #4a4540;
  --ink-muted: #8a8480;
  --accent: #b44a2d;
  --accent-hover: #963d24;
  --accent-light: rgba(180, 74, 45, 0.08);
  --accent-border: rgba(180, 74, 45, 0.2);
  --rule: rgba(26, 23, 20, 0.12);
  --rule-strong: rgba(26, 23, 20, 0.25);
  --sidebar-w: 280px;
  --serif: 'Instrument Serif', 'Georgia', serif;
  --sans: 'Source Sans 3', 'Helvetica Neue', sans-serif;
  --mono: 'IBM Plex Mono', 'Menlo', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--parchment);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Noise texture overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ── Sidebar ── */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--ink);
  color: var(--parchment);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.sidebar-header {
  padding: 32px 24px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-header .course-code {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
  font-weight: 500;
}

.sidebar-header h1 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  line-height: 1.3;
  color: var(--parchment);
}

.sidebar-header .term {
  font-family: var(--sans);
  font-size: 13px;
  color: rgba(246,241,235,0.45);
  margin-top: 4px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.nav-section {
  padding: 0 16px;
  margin-bottom: 4px;
}

.nav-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
  color: rgba(246,241,235,0.6);
  font-size: 14px;
  line-height: 1.4;
}

.nav-item:hover {
  background: rgba(255,255,255,0.06);
  color: var(--parchment);
}

.nav-item.active {
  background: rgba(180, 74, 45, 0.15);
  color: var(--parchment);
}

.nav-item .nav-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  min-width: 20px;
  padding-top: 2px;
  opacity: 0.8;
}

.nav-item.active .nav-num { opacity: 1; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
  color: rgba(246,241,235,0.3);
  font-family: var(--mono);
}

.sidebar-footer a {
  color: rgba(246,241,235,0.45);
  text-decoration: none;
  transition: color 0.2s;
}

.sidebar-footer a:hover { color: var(--accent); }

/* ── Mobile menu toggle ── */
.menu-toggle {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 200;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--ink);
  border: none;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

.menu-toggle span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--parchment);
  border-radius: 1px;
  transition: all 0.3s;
  position: relative;
}

.menu-toggle span::before,
.menu-toggle span::after {
  content: '';
  position: absolute;
  left: 0;
  width: 20px;
  height: 2px;
  background: var(--parchment);
  border-radius: 1px;
  transition: all 0.3s;
}

.menu-toggle span::before { top: -6px; }
.menu-toggle span::after { top: 6px; }

.menu-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 90;
  opacity: 0;
  transition: opacity 0.3s;
}

/* ── Main content ── */
.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
}

.hero {
  padding: 80px 60px 60px;
  border-bottom: 1px solid var(--rule);
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  top: -120px;
  right: -80px;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(180,74,45,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.hero-eyebrow {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 500;
}

.hero h2 {
  font-family: var(--serif);
  font-size: 48px;
  font-weight: 400;
  line-height: 1.15;
  color: var(--ink);
  max-width: 600px;
  margin-bottom: 16px;
}

.hero p {
  font-size: 18px;
  color: var(--ink-light);
  max-width: 560px;
  line-height: 1.7;
}

.hero-stats {
  display: flex;
  gap: 40px;
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid var(--rule);
}

.hero-stat .stat-num {
  font-family: var(--serif);
  font-size: 32px;
  color: var(--ink);
}

.hero-stat .stat-label {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 2px;
}

/* ── Content area ── */
.content {
  padding: 0 60px 80px;
}

/* ── Module card ── */
.module {
  padding-top: 56px;
  scroll-margin-top: 24px;
}

.module-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--rule-strong);
}

.module-number {
  font-family: var(--serif);
  font-size: 56px;
  line-height: 1;
  color: var(--accent);
  opacity: 0.25;
  min-width: 60px;
}

.module-title-block {
  padding-top: 8px;
}

.module-title {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 400;
  line-height: 1.25;
  color: var(--ink);
}

.module-subtitle {
  font-size: 15px;
  color: var(--ink-muted);
  margin-top: 4px;
}

.module-body {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 40px;
  max-width: 900px;
}

.module-description {
  font-size: 16px;
  line-height: 1.75;
  color: var(--ink-light);
}

.module-description p + p { margin-top: 12px; }

.module-description ul {
  margin-top: 10px;
  padding-left: 20px;
}

.module-description li {
  margin-bottom: 6px;
  color: var(--ink-light);
}

/* ── Lecture cards ── */
.lectures-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.lectures-panel h4 {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 4px;
  font-weight: 500;
}

.lecture-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: white;
  border: 1px solid var(--rule);
  border-radius: 10px;
  text-decoration: none;
  color: var(--ink);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.lecture-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  transform: scaleY(0);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.lecture-card:hover {
  border-color: var(--accent-border);
  background: var(--accent-light);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(180, 74, 45, 0.08);
}

.lecture-card:hover::before { transform: scaleY(1); }

.lecture-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.lecture-icon svg {
  width: 18px;
  height: 18px;
  color: var(--accent);
}

.lecture-info {
  flex: 1;
  min-width: 0;
}

.lecture-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.lecture-meta {
  font-size: 12px;
  color: var(--ink-muted);
  font-family: var(--mono);
}

.lecture-arrow {
  color: var(--ink-muted);
  transition: all 0.25s;
  flex-shrink: 0;
}

.lecture-card:hover .lecture-arrow {
  color: var(--accent);
  transform: translateX(3px);
}

/* ── Reading pills ── */
.readings {
  margin-top: 8px;
}

.readings h4 {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 8px;
  font-weight: 500;
}

.reading-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.reading-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--ink-light);
  background: var(--parchment-dark);
  border: 1px solid var(--rule);
  text-decoration: none;
  transition: all 0.2s;
}

.reading-pill:hover {
  border-color: var(--accent-border);
  color: var(--accent);
}

.reading-pill.is-link { cursor: pointer; }

.reading-pill svg {
  width: 12px;
  height: 12px;
  opacity: 0.5;
}

/* ── Prerequisites section ── */
.prereqs {
  background: white;
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 28px 32px;
  margin-top: 40px;
  max-width: 900px;
}

.prereqs h4 {
  font-family: var(--serif);
  font-size: 20px;
  margin-bottom: 12px;
}

.prereqs-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.prereq-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: 8px;
  background: var(--parchment);
  border: 1px solid var(--rule);
  text-decoration: none;
  color: var(--ink);
  transition: all 0.2s;
}

.prereq-card:hover {
  border-color: var(--accent-border);
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.prereq-card .prereq-icon { font-size: 20px; }
.prereq-card .prereq-label { font-size: 13px; font-weight: 600; }
.prereq-card .prereq-sub { font-size: 11px; color: var(--ink-muted); }

/* ── Scroll progress ── */
.progress-bar {
  position: fixed;
  top: 0;
  left: var(--sidebar-w);
  right: 0;
  height: 3px;
  background: transparent;
  z-index: 50;
}

.progress-bar .bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.1s linear;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.module {
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
}

.module:nth-child(1) { animation-delay: 0.05s; }
.module:nth-child(2) { animation-delay: 0.1s; }
.module:nth-child(3) { animation-delay: 0.15s; }
.module:nth-child(4) { animation-delay: 0.2s; }
.module:nth-child(5) { animation-delay: 0.25s; }
.module:nth-child(6) { animation-delay: 0.3s; }
.module:nth-child(7) { animation-delay: 0.35s; }
.module:nth-child(8) { animation-delay: 0.4s; }

.hero { animation: fadeUp 0.6s ease forwards; }

/* ── Responsive ── */
@media (max-width: 960px) {
  .module-body {
    grid-template-columns: 1fr;
    gap: 24px;
  }
  .prereqs-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .menu-toggle { display: flex; }
  .menu-overlay.open { display: block; opacity: 1; }

  .main { margin-left: 0; }
  .progress-bar { left: 0; }

  .hero { padding: 80px 24px 40px; }
  .hero h2 { font-size: 32px; }
  .content { padding: 0 24px 60px; }

  .hero-stats { gap: 24px; }
  .prereqs-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
const BASE = 'https://web.stanford.edu/class/cs234/';

const modules = [
  {
    id: 'intro',
    num: '01',
    title: 'Introduction to Reinforcement Learning',
    subtitle: 'Foundations & course overview',
    description: `
      <p>An overview of the reinforcement learning problem: agents, environments, rewards, and the challenge of sequential decision-making under uncertainty. Sets the stage for the mathematical frameworks to follow.</p>
      <p>This module also covers the prerequisite mathematical background you'll need throughout the course.</p>
    `,
    lectures: [
      { label: 'Lecture 1', file: 'slides/lecture1pre.pdf' }
    ],
    readings: [
      { text: 'SB Chapter 1', type: 'book' }
    ],
    prereqs: [
      { label: 'Linear Algebra Review', sub: 'CS229 Notes', icon: '&#x1D465;', url: 'http://cs229.stanford.edu/section/cs229-linalg.pdf' },
      { label: 'Probability Review', sub: 'CS229 Notes', icon: 'P', url: 'http://cs229.stanford.edu/section/cs229-prob.pdf' },
      { label: 'Python & NumPy', sub: 'CS231n Tutorial', icon: '&#x3BB;', url: 'http://cs231n.github.io/python-numpy-tutorial/' }
    ]
  },
  {
    id: 'mdp-planning',
    num: '02',
    title: 'Tabular MDP Planning',
    subtitle: 'Markov decision processes & dynamic programming',
    description: `
      <p>Formalizes the RL problem as a Markov Decision Process. Covers state values, action values, the Bellman equations, and dynamic programming methods&mdash;policy evaluation, policy iteration, and value iteration&mdash;for when the model is known.</p>
    `,
    lectures: [
      { label: 'Lecture 2', file: 'slides/lecture2pre.pdf' }
    ],
    readings: [
      { text: 'SB Chapter 3', type: 'book' },
      { text: 'SB 4.1 \u2013 4.4', type: 'book' }
    ]
  },
  {
    id: 'policy-eval',
    num: '03',
    title: 'Tabular RL Policy Evaluation',
    subtitle: 'Monte Carlo & temporal-difference methods',
    description: `
      <p>How to estimate value functions without a model. Introduces Monte Carlo policy evaluation, temporal-difference learning (TD(0)), and the bias-variance tradeoff between them. Covers eligibility traces and n-step returns.</p>
    `,
    lectures: [
      { label: 'Lecture 3', file: 'slides/lecture3pre.pdf' }
    ],
    readings: [
      { text: 'SB 5.1, 5.5', type: 'book' },
      { text: 'SB 6.1 \u2013 6.3', type: 'book' }

  },
  {
    id: 'q-learning',
    num: '04',
    title: 'Q-Learning',
    subtitle: 'Off-policy control & function approximation',
    description: `
      <p>Model-free control: SARSA, Q-learning, and the distinction between on-policy and off-policy methods. Introduces importance sampling corrections and lays the groundwork for scaling to large state spaces with function approximation.</p>
    `,
    lectures: [
      { label: 'Lecture 4', file: 'slides/lecture4pre.pdf' }
    ],
    readings: [
      { text: 'SB 5.2, 5.4', type: 'book' },

  {
    id: 'policy-gradient',
    num: '05',
    title: 'Policy Gradient Methods',
    subtitle: 'REINFORCE, baselines & actor-critic',
    description: `
      <p>A shift from value-based to policy-based methods. Derives the policy gradient theorem, the REINFORCE algorithm, variance reduction via baselines, and the actor-critic architecture that combines value estimation with policy optimization.</p>
    `,
    lectures: [
      { label: 'Lecture 5', file: 'slides/lecture5pre.pdf' },
      { label: 'Lecture 6', file: 'slides/lecture6pre.pdf' },
      { label: 'Lecture 7', file: 'slides/lecture7pre.pdf' }

    readings: [
      { text: 'SB Chapter 13', type: 'book' }

  {

    num: '06',
    title: 'Imitation Learning & Batch RL',
    subtitle: 'Learning from demonstrations & offline data',
    description: `
      <p>When environment interaction is expensive or risky, we can learn from expert demonstrations (behavioral cloning, DAgger) or from fixed datasets of prior experience (batch/offline RL). Covers distribution shift, conservative policy updates, and practical considerations.</p>
    `,
    lectures: [
      { label: 'Lecture 7', file: 'slides/lecture7pre.pdf' },
      { label: 'Lecture 8', file: 'slides/lecture8pre.pdf' }

const slideIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;

const arrowIcon = `<svg class="lecture-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

const bookIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;

const linkIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

// Build sidebar nav
const nav = document.getElementById('sidebarNav');
modules.forEach(m => {
  const section = document.createElement('div');
  section.className = 'nav-section';
  section.innerHTML = `
    <a class="nav-item" href="#${m.id}" data-id="${m.id}">
      <span class="nav-num">${m.num}</span>
      <span>${m.title}</span>
    </a>
  `;
  nav.appendChild(section);
});

// Build content
const content = document.getElementById('content');
modules.forEach(m => {
  const lectureCards = m.lectures.map(l => `
    <a class="lecture-card" href="${BASE}${l.file}" target="_blank" rel="noopener">
      <div class="lecture-icon">${slideIcon}</div>
      <div class="lecture-info">
        <div class="lecture-label">${l.label}</div>
        <div class="lecture-meta">PDF slides</div>
      </div>
      ${arrowIcon}
    </a>
  `).join('');

  const readingPills = m.readings.length ? `
    <div class="readings">
      <h4>Readings</h4>
      <div class="reading-pills">
        ${m.readings.map(r => {
          if (r.type === 'link') {
            return `<a class="reading-pill is-link" href="${r.url}" target="_blank" rel="noopener">${linkIcon} ${r.text}</a>`;
          }
          return `<span class="reading-pill">${bookIcon} ${r.text}</span>`;
        }).join('')}
      </div>
    </div>
  ` : '';

  const prereqsHTML = m.prereqs ? `
    <div class="prereqs">
      <h4>Prerequisites &amp; Setup</h4>
      <div class="prereqs-grid">
        ${m.prereqs.map(p => `
          <a class="prereq-card" href="${p.url}" target="_blank" rel="noopener">
            <span class="prereq-icon" style="font-family:var(--serif);font-size:18px;color:var(--accent)">${p.icon}</span>
            <div>
              <div class="prereq-label">${p.label}</div>
              <div class="prereq-sub">${p.sub}</div>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  ` : '';

  const moduleHTML = document.createElement('section');
  moduleHTML.className = 'module';
  moduleHTML.id = m.id;
  moduleHTML.innerHTML = `
    <div class="module-header">
      <div class="module-number">${m.num}</div>
      <div class="module-title-block">
        <div class="module-title">${m.title}</div>
        <div class="module-subtitle">${m.subtitle}</div>
      </div>
    </div>
    <div class="module-body">
      <div>
        <div class="module-description">${m.description}</div>
        ${prereqsHTML}
      </div>
      <div>
        <div class="lectures-panel">
          <h4>Lectures</h4>
          ${lectureCards}
        </div>
        ${readingPills}
      </div>
    </div>
  `;
  content.appendChild(moduleHTML);
});

// Active nav tracking
const navItems = document.querySelectorAll('.nav-item');
const sections = document.querySelectorAll('.module');

function updateActiveNav() {
  let current = '';
  sections.forEach(s => {
    const top = s.getBoundingClientRect().top;
    if (top < 200) current = s.id;
  });
  navItems.forEach(item => {
    item.classList.toggle('active', item.dataset.id === current);
  });
}

// Scroll progress
function updateProgress() {
  const scrolled = window.scrollY;
  const total = document.documentElement.scrollHeight - window.innerHeight;
  const pct = total > 0 ? (scrolled / total) * 100 : 0;
  document.querySelector('.progress-bar .bar').style.width = pct + '%';
}

window.addEventListener('scroll', () => {
  updateActiveNav();
  updateProgress();
}, { passive: true });

updateActiveNav();

// Mobile sidebar
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.menu-overlay').classList.toggle('open');
}

// Close mobile sidebar on nav click
navItems.forEach(item => {
  item.addEventListener('click', () => {
    if (window.innerWidth <= 768) toggleSidebar();
  });
});
</script>
</body>
</html>
